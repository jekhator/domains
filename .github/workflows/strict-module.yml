name: strict-module

# DTO-discipline lint (frozen+slots, facade-ban, R001-R006). Per-repo copy of
# the qhcg canonical gate; runs on the root-layout package. Empty baseline at
# v0.2.0 (clean rebuild — 0 violations).

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
      - name: Install Python 3.12
        run: uv python install 3.12
      - name: Run strict-module
        run: |
          echo "=== strict-module: domain_errors ===" && \
          uvx --python 3.12 --from strict-suite==0.2.0 strict-module domain_errors/ --format github && \
          echo "=== strict-module: domain_security ===" && \
          uvx --python 3.12 --from strict-suite==0.2.0 strict-module domain_security/ --format github && \
          echo "=== strict-module: domain_api_limiter ===" && \
          uvx --python 3.12 --from strict-suite==0.2.0 strict-module domain_api_limiter/ --format github && \
          echo "=== strict-module: domain_monitoring ===" && \
          uvx --python 3.12 --from strict-suite==0.2.0 strict-module domain_monitoring/ --format github && \
          echo "=== strict-module: domain_aspects ===" && \
          uvx --python 3.12 --from strict-suite==0.2.0 strict-module domain_aspects/ --format github && \
          echo "=== strict-module: domain_rag ===" && \
          uvx --python 3.12 --from strict-suite==0.2.0 strict-module domain_rag/ --format github
      - name: Check LOC cap
        run: |
          for dir in domain_errors domain_security domain_api_limiter domain_monitoring domain_aspects domain_rag; do
            echo "=== loc-cap: $dir ===" && \
            uvx --python 3.12 --from strict-suite==0.2.0 strict-module loc-cap "$dir"
          done
